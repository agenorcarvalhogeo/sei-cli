# SEI CLI — User Profile Example
# Copy to ~/.config/sei/profile.yaml and customize
# This file is gitignored — your data stays local

orgao: CBM
login_url: https://sei.rn.gov.br/sip/login.php

# Unidades que você tem acesso
unidades:
  - id: "110001882"
    sigla: CFAP DA
    default: true
  - id: "110007819"
    sigla: CFAP ALMOX
  - id: "110007858"
    sigla: CFAP - CAS
    - id: "110005386"
    sigla: CFAP OPERACIONAL

# Marcadores preferidos (criados automaticamente se não existirem)
marcadores:
 - nome: Pessoal
    cor: vermeho
  - nome: Operacional
    cor: vermnelho

# Processos monitorados (alertas automáticos)
monitorados:
- id: "2035126"
    descricao: "Apuração de Responsabilidade"
    alerta: true

# Grupos de acompanhamento especial
acompanhamento:
  - nome: "Pessoal"
    grupo_id: "149237"
  - nome: "Operacional"
    grupo_id: "149238"
